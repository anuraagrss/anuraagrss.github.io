function log(m,c=''){document.getElementById('log').innerHTML+=`<div class="${c}">${m}</div>`;}
window.run=async function(){
  const btn=document.getElementById('btn');btn.disabled=true;
  try{
    log('Opening sign-in…','dim');
    const r=await signInWithPopup(auth,new GoogleAuthProvider());
    log('Signed in as '+r.user.email,'ok');
    const s=await getDoc(doc(db,'admins',r.user.uid));
    if(!s.exists()){log('Not an admin','err');return;}
    await setDoc(doc(db,'config','countries'),{
      visited:C,updated_at:new Date().toISOString(),updated_by:r.user.uid,
      total:C.length,
      visited_count:C.filter(c=>c.status==='visited').length,
      transiting_count:C.filter(c=>c.status==='transiting').length,
    });
    log('Done — '+C.length+' countries written to Firestore','ok');
    log('Visited: '+C.filter(c=>c.status==='visited').length,'ok');
    log('Transiting: '+C.filter(c=>c.status==='transiting').length,'ok');
    btn.textContent='DONE — DELETE THIS FILE';
  }catch(e){log('Error: '+e.message,'err');btn.disabled=false;}
};
