<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="icon" href="Logo.ico" type="image/x-icon">
  <title>404-Nomad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="404-Nomad peek overlay menu">

  <style>
    @import url("https://fonts.googleapis.com/css?family=Cute+Font&display=swap");
    :root {
      --bg-main: #F3F1EF;
      --primary: #3a506b;
      --secondary: #5bc0be;
      --accent: #1c2541;
      --bubble-bg: #5bc0be;
      --bubble-hover: #3a506b;
      --font-main: "Cute Font", Roboto, sans-serif;
      --base-font-size: 2vw;
      --h1-font-size: 2.8vw;
      --desc-font-size: 1.3vw;
      --menu-font-size: 2vw;
      --bubble-size: 7vw;
      --transition: 0.4s ease;

      /* theme tokens — animated by JS */
      --theme-bg:          #F3F1EF;
      --theme-text:        #3a506b;
      --theme-desc-text:   #3a506b;
      --theme-grid-color:  rgba(58,80,107,0.0);
      --theme-glow-color:  rgba(91,192,190,0.0);
      --theme-seam-color:  rgba(58,80,107,0.12);
      --theme-avatar-drop: rgba(0,0,0,0.0);
    }

    /* smooth theme transitions on everything that changes */
    html, body, .face, .face::after,
    .designer .description h1,
    .designer .description p,
    .coder .description h1,
    .coder .description p {
      transition:
        background-color 0.65s ease,
        color 0.65s ease,
        border-color 0.65s ease !important;
    }

    /* grid overlay — only visible in engineer mode */
    .theme-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(var(--theme-grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--theme-grid-color) 1px, transparent 1px);
      background-size: 52px 52px;
      transition: opacity 0.65s ease;
      opacity: 0;
    }

    /* center glow */
    .theme-glow {
      position: fixed; top: -10%; left: 50%; transform: translateX(-50%);
      width: 900px; height: 500px;
      background: radial-gradient(ellipse, var(--theme-glow-color) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
      transition: opacity 0.65s ease;
      opacity: 0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%; min-height: 100vh;
      overflow-x: hidden; background: var(--theme-bg);
    }
    body {
      font-family: var(--font-main);
      font-size: var(--base-font-size);
      color: var(--theme-text);
      display: flex; flex-direction: column;
      min-height: 100vh; width: 100vw;
    }

    main {
      flex: 1; width: 100vw; height: 100vh; min-height: 100vh;
      display: flex; align-items: stretch; justify-content: stretch;
      padding: 0; background: transparent;
    }

    .face {
      width: 100vw; height: 100vh;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; background: transparent;
    }

    /* ── AVATAR — fixed crop + floating ── */
    .face-bg-img {
      position: absolute;
      left: 50%; bottom: 0;
      width: 78vmin;
      height: auto;
      max-width: 820px;
      max-height: 92vh;
      object-fit: contain;
      object-position: top center;
      transform: translateX(-50%);
      z-index: 0;
      pointer-events: none;
      user-select: none;
      display: block;
      animation: avatarFloat 5s ease-in-out infinite;
      transition: filter 0.65s ease;
      filter: drop-shadow(0 24px 48px var(--theme-avatar-drop));
    }
    @keyframes avatarFloat {
      0%, 100% { transform: translateX(-50%) translateY(0px);    }
      50%       { transform: translateX(-50%) translateY(-14px);  }
    }

    /* ── HALVES ── */
    .designer, .coder {
      z-index: 1;
      flex: 1 1 50%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      position: relative; cursor: pointer;
      overflow: hidden; background: transparent;
      border: none !important; box-shadow: none !important; outline: none !important;
      transition: background 0.4s;
    }
    .designer:focus, .coder:focus { outline: none !important; }

    /* subtle hover wash */
    .designer::before, .coder::before {
      content: ''; position: absolute; inset: 0;
      opacity: 0; transition: opacity 0.4s; pointer-events: none;
    }
    .designer::before { background: linear-gradient(to right, rgba(13,17,23,0.22), transparent); }
    .coder::before    { background: linear-gradient(to left,  rgba(243,241,239,0.18), transparent); }
    .designer:hover::before, .coder:hover::before { opacity: 1; }
    .designer::after, .coder::after { display: none !important; }

    /* description — hidden until hover */
    .designer .description,
    .coder .description {
      opacity: 0; pointer-events: none;
      position: relative; background: none;
      color: var(--primary); padding: 0;
      border-radius: 0; box-shadow: none;
      text-align: center; max-width: 320px;
      transition: opacity 0.4s; z-index: 3;
    }
    .designer:hover .description,
    .designer:focus .description,
    .coder:hover .description,
    .coder:focus .description { opacity: 1; pointer-events: auto; }

    .designer .description h1,
    .coder .description h1 {
      margin-bottom: 12px;
      font-size: var(--h1-font-size);
      letter-spacing: 2px; color: var(--theme-desc-text);
    }
    .designer .description p,
    .coder .description p {
      font-size: var(--desc-font-size);
      line-height: 1.4; color: var(--theme-desc-text);
    }

    /* ── TERMINAL DRAWER ── */
    .term-backdrop {
      position: fixed; inset: 0; z-index: 499;
      background: rgba(243,241,239,0.55);
      backdrop-filter: blur(3px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.42s ease;
    }
    .term-backdrop.open { opacity: 1; pointer-events: auto; }

    .term-overlay {
      position: fixed; top: 0; right: 0;
      width: min(460px, 92vw); height: 100vh;
      z-index: 500;
      transform: translateX(102%);
      transition: transform 0.42s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      display: flex;
    }
    .term-overlay.open { transform: translateX(0); pointer-events: auto; }

    .term-window {
      flex: 1; display: flex; flex-direction: column;
      background: #0d1117;
      box-shadow: -8px 0 48px rgba(28,37,65,0.2);
      font-family: 'Courier New', monospace;
    }
    .term-titlebar {
      background: #161b22; padding: 11px 18px;
      display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
    }
    .tb-dot { width: 11px; height: 11px; border-radius: 50%; cursor: pointer; }
    .tb-red    { background: #ff5f57; }
    .tb-yellow { background: #febc2e; }
    .tb-green  { background: #28c840; }
    .tb-title  { font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 1.5px; margin-left: 6px; }
    .tb-clock  { margin-left: auto; font-size: 11px; color: rgba(91,192,190,0.5); letter-spacing: 1px; }

    .term-body {
      flex: 1; overflow-y: auto; padding: 18px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .term-body::-webkit-scrollbar { width: 3px; }
    .term-body::-webkit-scrollbar-thumb { background: rgba(91,192,190,0.2); border-radius: 2px; }

    .tline { font-size: 12px; line-height: 1.85; }
    .tline.output { padding-left: 14px; }
    .tline.spacer { height: 8px; }
    .tline.prompt-line { display: flex; gap: 8px; }
    .ps  { color: #5bc0be; flex-shrink: 0; font-size: 11px; }
    .cmd { color: #e6edf3; }

    .c-teal    { color: #5bc0be; }
    .c-dim     { color: rgba(230,237,243,0.28); }
    .c-muted   { color: rgba(230,237,243,0.6); }
    .c-white   { color: #e6edf3; font-weight: 600; }
    .c-success { color: #3fb950; }
    .c-error   { color: #f85149; }
    .c-amber   { color: #d29922; }
    .c-link    { color: #58a6ff; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
    .c-link:hover { color: #79c0ff; }

    .chip-row { display: flex; flex-wrap: wrap; gap: 7px; padding: 8px 0 8px 14px; }
    .chip {
      background: rgba(91,192,190,0.08);
      border: 1px solid rgba(91,192,190,0.25);
      color: #5bc0be; font-size: 11px; padding: 5px 14px;
      border-radius: 4px; cursor: pointer;
      font-family: 'Courier New', monospace; letter-spacing: 0.5px;
      transition: all 0.15s;
    }
    .chip:hover { background: rgba(91,192,190,0.18); border-color: #5bc0be; }
    .chip.sec {
      background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4);
    }
    .chip.sec:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.7); }

    .hint-row { display: flex; flex-wrap: wrap; gap: 16px; padding: 4px 0 4px 14px; }
    .hint { font-size: 10px; color: rgba(255,255,255,0.18); letter-spacing: 0.5px; }
    .hint span { color: rgba(91,192,190,0.45); }

    .prog-row { display: flex; align-items: center; gap: 10px; padding: 2px 0 2px 14px; }
    .prog-name { font-size: 11px; color: rgba(230,237,243,0.6); min-width: 155px; }
    .prog-bars { display: flex; gap: 2px; }
    .pb { width: 13px; height: 7px; border-radius: 1px; background: rgba(91,192,190,0.1); }
    .pb.on { background: #5bc0be; }

    .term-input-area {
      padding: 13px 18px;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex; align-items: center; gap: 10px;
      background: #0d1117; flex-shrink: 0;
    }
    .input-ps { color: #5bc0be; font-size: 12px; flex-shrink: 0; }
    .term-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #e6edf3; font-family: 'Courier New', monospace; font-size: 12px;
      caret-color: #5bc0be;
    }
    .term-input::placeholder { color: rgba(255,255,255,0.12); }
    .cursor-blink {
      width: 7px; height: 13px; background: #5bc0be;
      border-radius: 1px; animation: cblink 1s step-end infinite;
    }
    @keyframes cblink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── RIGHT-EDGE PULL TAB — same style as social bar ── */
    .term-trigger {
      position: fixed;
      top: 50%; right: 0;
      transform: translateY(-50%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      background: rgba(243, 241, 239, 0.85);
      padding: 18px 12px;
      border-radius: 24px 0 0 24px;
      box-shadow: 0 4px 24px rgba(60,80,107,0.12);
      z-index: 300;
      min-width: 56px;
      cursor: pointer;
      border: none;
      transition: background 0.2s, box-shadow 0.2s, transform 0.25s;
    }
    .term-trigger:hover {
      background: rgba(243,241,239,1);
      box-shadow: 0 6px 32px rgba(60,80,107,0.18);
      transform: translateY(-50%) translateX(-4px);
    }
    .term-trigger svg {
      display: block;
      filter: drop-shadow(0 1px 2px rgba(60,80,107,0.10));
      width: 36px; height: 36px;
    }
    /* pulsing dot — same visual rhythm as social bar hover */
    .term-trigger-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #5bc0be;
      box-shadow: 0 0 6px rgba(91,192,190,0.5);
      animation: tDot 2.4s ease-in-out infinite;
    }
    @keyframes tDot {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.35; transform: scale(0.65); }
    }
    /* vertical label — matches social bar font style */
    .term-trigger-label {
      font-family: "Cute Font", Roboto, sans-serif;
      font-size: 11px; letter-spacing: 3px;
      color: var(--accent); opacity: 0.5;
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }
    .term-trigger.hidden {
      opacity: 0; pointer-events: none;
      transform: translateY(-50%) translateX(16px);
      transition: opacity 0.25s, transform 0.25s;
    }

    /* ── ORIGINAL BUBBLE OVERLAY NAV (kept 100% intact) ── */
    .nav-toggle { position: absolute; left: -9999px; }

    .overlay {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(243, 241, 239, 0.85);
      opacity: 0; pointer-events: none;
      transition: opacity var(--transition);
      z-index: 150;
    }
    .nav-toggle:checked ~ .overlay { opacity: 1; pointer-events: auto; }

    .menu { list-style: none; position: relative; width: 100%; height: 100%; }
    .menu li {
      position: absolute;
      width: var(--bubble-size); height: var(--bubble-size);
      border-radius: 50%; background: var(--bubble-bg);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-weight: bold;
      opacity: 0; transform: scale(0.6);
      transition: opacity var(--transition), transform var(--transition),
                  background var(--transition), color var(--transition);
      box-shadow: 0 2px 12px rgba(60,80,107,0.12);
    }
    .nav-toggle:checked ~ .overlay .menu li { opacity: 1; transform: scale(1); }
    .menu li a {
      color: inherit; text-decoration: none;
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s;
      font-size: var(--menu-font-size);
      font-family: var(--font-main);
    }
    .menu li a:hover { transform: scale(1.1); }
    .menu li:not(.about):not(.professional) a:hover { color: var(--accent); }
    .menu li.about a:hover, .menu li.professional a:hover { color: #fff; }
    .menu li.home        { top: 15%; left: 30%; }
    .menu li.about       { top:  5%; left: 70%; background: var(--bubble-hover); color: #fff; }
    .menu li.nomad       { top: 45%; left: 85%; }
    .menu li.professional{ top: 75%; left: 65%; background: var(--bubble-hover); color: #fff; }
    .menu li.contact     { top: 70%; left: 20%; }

    /* ── SOCIAL BAR (original, untouched) ── */
    .social-bar {
      position: fixed; top: 50%; left: 0; transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 24px;
      background: rgba(243,241,239,0.85); padding: 18px 12px;
      border-radius: 0 24px 24px 0;
      box-shadow: 0 4px 24px rgba(60,80,107,0.12);
      z-index: 300; min-width: 56px;
    }
    .social-bar a {
      display: flex; align-items: center; justify-content: center;
      opacity: 0.85; transition: opacity 0.2s, transform 0.2s; margin-left: 4px;
    }
    .social-bar a:hover { opacity: 1; transform: scale(1.15); }
    .social-bar svg { display: block; filter: drop-shadow(0 1px 2px rgba(60,80,107,0.10)); width: 36px; height: 36px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      body { font-size: 3vw; }
      .face { flex-direction: column; }
      .designer, .coder { width: 100vw; height: 50vh; }
      .face-bg-img { width: 88vmin; }
      .designer .description h1, .coder .description h1 { font-size: 5vw; }
      .designer .description p,  .coder .description p  { font-size: 2.5vw; }
      .menu li { width: 10vw; height: 10vw; }
      .menu li a { font-size: 3vw; }
    }
    @media (max-width: 700px) {
      .face { flex-direction: column; }
      .designer, .coder { width: 100vw; height: 50vh; }
      .face-bg-img { width: 96vmin; }
      .social-bar { gap: 16px; padding: 10px 6px; border-radius: 0 16px 16px 0; min-width: 44px; }
      .social-bar svg { width: 28px; height: 28px; }
      .term-trigger { padding: 14px 8px; min-width: 44px; border-radius: 16px 0 0 16px; gap: 12px; }
      .term-trigger svg { width: 28px; height: 28px; }
      .term-trigger-label { font-size: 9px; letter-spacing: 2px; }
      .menu li { width: 70px; height: 70px; font-size: 1em; }
      .menu li.home        { top: 10%; left: 20%; }
      .menu li.about       { top:  5%; left: 65%; }
      .menu li.nomad       { top: 40%; left: 80%; }
      .menu li.professional{ top: 70%; left: 60%; }
      .menu li.contact     { top: 65%; left: 15%; }
    }
    @media (max-width: 500px) {
      body { font-size: 4vw; }
      .designer .description h1, .coder .description h1 { font-size: 7vw; }
      .designer .description p,  .coder .description p  { font-size: 4vw; }
      .menu li { width: 14vw; height: 14vw; }
      .menu li a { font-size: 4vw; }
    }
  </style>
</head>
