<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Flight Enrichment Tool — nomad-404</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/enrich-historical.css">
</head>
<body>

<div class="header">
  <h1>FLIGHT ENRICHMENT</h1>
  <span>ONE-TIME HISTORICAL TOOL · nomad-404</span>
</div>

<div class="grid">
  <div>
    <div class="card">
      <div class="card-title">// CONFIGURATION</div>
      <label>AERODATABOX API KEY (api.market)</label>
      <input type="password" id="adbKey" placeholder="your x-magicapi-key">
      <label>MODE</label>
      <select id="mode">
        <option value="unenriched">Skip already enriched flights</option>
        <option value="all">Re-enrich everything</option>
        <option value="test">Test mode — first 3 flights only</option>
      </select>
      <label>SOURCES</label>
      <select id="sources">
        <option value="both">AeroDataBox + OpenSky (metadata + track)</option>
        <option value="adb">AeroDataBox only (metadata, no track)</option>
        <option value="opensky">OpenSky only (track/path only)</option>
      </select>
      <label>DELAY BETWEEN REQUESTS (ms)</label>
      <input type="number" id="delay" value="1000" min="500" max="5000">
      <button class="btn btn-primary" id="startBtn" onclick="startEnrichment()">▶ START ENRICHMENT</button>
      <button class="btn btn-ghost"   id="stopBtn"  onclick="stopEnrichment()" disabled>■ STOP</button>

      <div class="progress-wrap" id="progressWrap">
        <div class="progress-header">
          <span class="progress-label"  id="progressLabel">Initialising…</span>
          <span class="progress-counter" id="progressCounter">0 / 0</span>
        </div>
        <div class="progress-bar-track"><div class="progress-bar-fill" id="progressBar"></div></div>
        <div class="progress-stats">
          <span><span style="color:var(--green)">✓</span> <span id="cntEnriched">0</span> enriched</span>
          <span><span style="color:var(--gold)">–</span>  <span id="cntSkipped">0</span> skipped</span>
          <span><span style="color:var(--red)">✗</span>   <span id="cntFailed">0</span> failed</span>
        </div>
      </div>

      <div class="summary-box" id="summaryBox">
        <div class="card-title" style="margin-bottom:0;padding-bottom:0;border:none">// COMPLETE</div>
        <div class="summary-grid">
          <div class="summary-item"><div class="summary-num s-green" id="sumEnriched">0</div><div class="summary-lbl">ENRICHED</div></div>
          <div class="summary-item"><div class="summary-num s-gold"  id="sumSkipped">0</div><div class="summary-lbl">SKIPPED</div></div>
          <div class="summary-item"><div class="summary-num s-red"   id="sumFailed">0</div><div class="summary-lbl">FAILED</div></div>
          <div class="summary-item"><div class="summary-num s-muted" id="sumTotal">0</div><div class="summary-lbl">TOTAL</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">// ENRICHMENT LOG</div>
    <div class="log-wrap" id="logWrap">
      <div class="log-line log-info">
        <span class="log-time">—</span>
        <span class="log-msg">Ready. Enter your AeroDataBox API key and click START.</span>
      </div>
    </div>
  </div>
</div>

<script type="module" src="js/enrich-historical-module.js"></script>
</body>
</html>
